# Schema reference:
# https://learn.chatgpt.com/docs/config-schema.json
# Execution boundaries live in $CODEX_HOME/{out-of-band,workbook}.config.toml.
# Select one with `codex --profile <name>`.

[shell_environment_policy]
inherit = "all"
exclude = ["PYTHONHOME"]

[[hooks.PreToolUse]]
matcher = "^(Bash|tool_exec|apply_patch|Edit|Write|mcp__git_mcp_server__.*|mcp__cue_lsp__.*|mcp__gopls__.*|mcp__marimo_code_mode__.*|mcp__workbook__.*)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = '"$(git rev-parse --show-toplevel)/.venv/bin/python" "$(git rev-parse --show-toplevel)/.codex/hooks/cuestrap_tool_supervisor.py" --repository-root "$(git rev-parse --show-toplevel)" hook'
timeout = 10
statusMessage = "Routing through CUEstrap controller workbooks"

[[hooks.PostToolUse]]
matcher = "^(Bash|tool_exec|apply_patch|Edit|Write|mcp__git_mcp_server__.*|mcp__cue_lsp__.*|mcp__gopls__.*|mcp__marimo_code_mode__.*|mcp__workbook__.*)$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = '"$(git rev-parse --show-toplevel)/.venv/bin/python" "$(git rev-parse --show-toplevel)/.codex/hooks/cuestrap_tool_supervisor.py" --repository-root "$(git rev-parse --show-toplevel)" hook'
timeout = 10
statusMessage = "Recording CUEstrap controller evidence"

[mcp_servers.cue_lsp]
command = "uv"
args = [
  "run",
  "--project", ".",
  "--locked",
  "--exact",
  "--",
  "python",
  "src/cue-workbook/workbook_cli.py",
  "--serve-mcp",
  "cue-lsp",
]
cwd = "."
enabled = true
required = true
enabled_tools = ["diagnostics", "hover", "definition", "references", "document_symbols"]
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.cue_lsp.env]
UV_PROJECT_ENVIRONMENT = ".venv"
PYTHONUNBUFFERED = "1"

[mcp_servers.git-mcp-server]
command = "git-mcp-go"
args = [
  "serve",
  "--mode",
  "go-git",
  "-r=.",
  "--write-access",
]
cwd = "."
enabled = true
required = true
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.marimo_code_mode]
url = "http://127.0.0.1:2718/mcp/server"
enabled = true
required = false
tool_timeout_sec = 60
supports_parallel_tool_calls = false

[mcp_servers.workbook]
command = "uv"
args = [
  "run",
  "--project", ".",
  "--locked",
  "--exact",
  "--",
  "python",
  "src/cue-workbook/workbook_mcp_server.py",
  "--repository-root", ".",
  "--endpoint", "http://127.0.0.1:2718/mcp/server",
]
cwd = "."
enabled = true
required = true
enabled_tools = [
  "resolve_session",
  "capture_state",
  "run_probe",
  "apply_transaction",
  "bind_operation",
  "inspect_operation",
  "execute_operation",
  "collect_diagnosis",
  "release_binding",
]
startup_timeout_sec = 20
tool_timeout_sec = 120
supports_parallel_tool_calls = false

[mcp_servers.workbook.env]
UV_PROJECT_ENVIRONMENT = ".venv"
PYTHONUNBUFFERED = "1"

[mcp_servers.gopls]
command = "uv"
args = [
  "run",
  "--project", ".",
  "--locked",
  "--exact",
  "--",
  "python",
  "src/cue-workbook/workbook_cli.py",
  "--serve-mcp",
  "gopls",
]
cwd = "."
enabled = true
required = false
enabled_tools = ["diagnostics", "hover", "definition", "references", "document_symbols"]
startup_timeout_sec = 20
tool_timeout_sec = 30
supports_parallel_tool_calls = false

[mcp_servers.gopls.env]
UV_PROJECT_ENVIRONMENT = ".venv"
PYTHONUNBUFFERED = "1"
